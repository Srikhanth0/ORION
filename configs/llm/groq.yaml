# ═══════════════════════════════════════════════════════════════
# ORION — Groq Provider Configuration
# ═══════════════════════════════════════════════════════════════

provider_name: groq

# Models available on Groq
models:
  text: llama-3.3-70b-versatile
  vision: meta-llama/llama-4-scout-17b-16e-instruct

# Rate limit thresholds (free tier)
rate_limits:
  max_rpm: 30                  # requests per minute
  min_remaining_tokens_before_fallback: 1000
  backoff_strategy: exponential  # exponential | linear
  backoff_base_seconds: 2
  backoff_max_seconds: 32

# Generation defaults
defaults:
  temperature: 0.7
  max_tokens: 4096
  top_p: 0.95
