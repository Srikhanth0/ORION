# ═══════════════════════════════════════════════════════════════
# ORION — Kubernetes Deployment
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-api
  labels:
    app: orion
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: orion
      component: api
  template:
    metadata:
      labels:
        app: orion
        component: api
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: orion-api
          image: orion-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9091
              name: metrics
          envFrom:
            - configMapRef:
                name: orion-config
            - secretRef:
                name: orion-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 3
          volumeMounts:
            - name: configs
              mountPath: /app/configs
              readOnly: true
      volumes:
        - name: configs
          configMap:
            name: orion-app-configs
---
# ConfigMap for non-secret configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: orion-config
  labels:
    app: orion
data:
  ORION_ENV: "production"
  LOG_LEVEL: "INFO"
  METRICS_PORT: "9091"
  MAX_CONCURRENT_TASKS: "5"
  QDRANT_URL: "http://qdrant:6333"
