# ═══════════════════════════════════════════════════════════════
# ORION v1.0.0 — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════
name: ORION CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check orion/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check orion/ tests/ scripts/

      - name: Type check
        run: uv run mypy orion/ --ignore-missing-imports

  # ── Unit Tests ───────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short --junitxml=junit-unit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: junit-unit.xml

  # ── Integration Tests ───────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short --junitxml=junit-integration.xml
        env:
          QDRANT_URL: http://localhost:6333
          GROQ_API_KEY: ${ secrets['GROQ_API_KEY'] }

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml

  # ── Build & Push Container ──────────────────────────────
  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test-integration
    steps:
      - uses: actions/checkout@v4

      - name: Build Podman image
        run: podman build -t orion:${{ github.sha }} .

      - name: Tag as latest
        run: podman tag orion:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/orion:latest

      - name: Tag with version (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          podman tag orion:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/orion:${VERSION}

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          podman push ghcr.io/${{ github.repository_owner }}/orion:latest

  # ── Eval Suite (main only) ─────────────────────────────
  eval:
    name: Evaluation Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-integration
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run eval suite
        run: uv run python scripts/eval_task.py --all --verbose -o eval_report.json
        continue-on-error: true

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
