# ═══════════════════════════════════════════════════════════════
# ORION v1.0.0 — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════
name: ORION CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check orion/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check orion/ tests/ scripts/

      - name: Type check
        run: uv run mypy orion/ --ignore-missing-imports

  # ── Unit Tests ───────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run unit tests
        run: xvfb-run -a uv run pytest tests/unit/ -v --tb=short --junitxml=junit-unit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: junit-unit.xml

  # ── Integration Tests ───────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Start ORION API Server
        run: |
          nohup xvfb-run -a uv run python scripts/run_server.py > server.log 2>&1 &
          echo "Waiting for server to be ready..."
          max_attempts=30
          count=0
          until curl --output /dev/null --silent --fail http://localhost:8080/ready || [ $count -eq $max_attempts ]; do
            printf '.'
            sleep 2
            count=$((count + 1))
          done
          if [ $count -eq $max_attempts ]; then
            echo "Server failed to start"
            cat server.log
            exit 1
          fi
          echo "Server is ready!"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run integration tests
        run: xvfb-run -a uv run pytest tests/integration/ -v --tb=short --junitxml=junit-integration.xml
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml

  # ── Build & Push Container ──────────────────────────────
  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test-integration
    steps:
      - uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "REPO_LOWER=ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Build Podman image
        run: podman build -t orion:${{ github.sha }} .

      - name: Tag as latest
        run: podman tag orion:${{ github.sha }} ${{ env.REPO_LOWER }}:latest

      - name: Tag with version (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          podman tag orion:${{ github.sha }} ${{ env.REPO_LOWER }}:${VERSION}

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          podman push ${{ env.REPO_LOWER }}:latest

  # ── Eval Suite (main only) ─────────────────────────────
  eval:
    name: Evaluation Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-integration
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run eval suite
        run: xvfb-run -a uv run python scripts/eval_task.py --all --verbose -o eval_report.json
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
