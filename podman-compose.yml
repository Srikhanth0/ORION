# ═══════════════════════════════════════════════════════════════
# ORION — Podman Compose Full Stack
# ═══════════════════════════════════════════════════════════════
# Usage:
#   podman-compose up -d            # start all services
#   podman-compose down             # stop all services
#   podman-compose logs -f api      # follow API logs

services:
  # ── ORION API Server ───────────────────────────────────────
  orion-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orion-api
    ports:
      - "8080:8080"
      - "9091:9091"
    env_file: .env
    environment:
      - ORION_ENV=production
      - METRICS_PORT=9091
      - CHROMA_PERSIST_PATH=/app/.orion_memory
    volumes:
      - ./configs:/app/configs:ro
      - ./prompts:/app/prompts:ro
      - orion_memory:/app/.orion_memory
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ── ORION API (Dev Mode) ───────────────────────────────────
  orion-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orion-api-dev
    ports:
      - "8080:8080"
      - "9091:9091"
    env_file: .env
    environment:
      - ORION_ENV=development
      - LOG_LEVEL=DEBUG
      - CHROMA_PERSIST_PATH=/app/.orion_memory
    volumes:
      - ./orion:/app/orion
      - ./configs:/app/configs:ro
      - ./prompts:/app/prompts:ro
      - orion_memory:/app/.orion_memory
    command: >
      python -m uvicorn orion.api.server:app
      --host 0.0.0.0 --port 8080 --reload
    profiles:
      - dev
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: orion-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: orion-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  orion_memory:
  prometheus_data:
  grafana_data:
